name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: pigna
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            set -e
            cd /opt/portfolio-guidotti

            # Pull latest code (gitignored: content/, public/content/, manifest)
            git fetch origin master
            git reset --hard origin/master

            # Fix ownership/perms in case anything was left root-owned by an
            # earlier sudo run, or the artist uploaded content with restrictive
            # umask. Running every deploy keeps things idempotent.
            sudo chown -R pigna:pigna /opt/portfolio-guidotti/node_modules 2>/dev/null || true
            sudo chown -R pigna:pigna /opt/portfolio-guidotti/.next 2>/dev/null || true
            sudo chmod -R u+rwX,go+rX /opt/portfolio-guidotti/content 2>/dev/null || true

            # Install + build (prebuild auto-runs scripts/build-content.mjs)
            npm ci
            npm run build

            # Replace standalone runtime assets atomically — wipe-then-copy so
            # we never get nested directories from `cp -r` semantics.
            rm -rf .next/standalone/.next/static .next/standalone/public
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public

            mkdir -p logs

            pm2 describe portfolio-guidotti > /dev/null 2>&1 \
              && pm2 reload ecosystem.config.js --update-env \
              || pm2 start ecosystem.config.js

            pm2 save

            sleep 3
            pm2 status portfolio-guidotti
